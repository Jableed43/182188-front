<!-- 📝 DESAFÍO DE CLASE - CSS: Estilo y Cascada
 • Enlazá una hoja de estilos EXTERNA (css/tarjeta.css).
 • Empezá el .css con el reset profesional (* { margin:0; padding:0; box-sizing:border-box }).
 • Maquetá una "tarjeta de perfil" usando el Box Model (padding, border, margin).
 • Usá una CLASE para la tarjeta (reutilizable) y tamaños en rem.
 • Agregá un botón con efecto :hover.
 • Probalo en el navegador. -->

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafío - Tarjeta de perfil</title>
    <link rel="stylesheet" href="css/tarjeta.css">
</head>
<body>

    <main>
        <!-- Clase reutilizable: podés copiar esta tarjeta varias veces -->
        <article class="tarjeta">
            <img class="tarjeta__foto" src="https://http.cat/images/200.jpg" alt="Foto de perfil">
            <h2 class="tarjeta__nombre">Javier Nehuen López</h2>
            <p class="tarjeta__rol">Desarrollador Front-End</p>
            <p class="tarjeta__bio">
                Amo React y la electrónica. Aprendiendo a maquetar con CSS,
                cascada y Box Model.
            </p>
            <a class="tarjeta__boton" href="#">Seguir</a>
        </article>
    </main>

</body>
</html>
